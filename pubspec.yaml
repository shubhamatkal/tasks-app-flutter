name: tasks_app
description: DayTask - Personal Task Tracker built with Flutter and Supabase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Supabase
  supabase_flutter: ^2.8.4
  # State management
  provider: ^6.1.2
  # Navigation
  go_router: ^14.6.3
  # UI helpers
  google_fonts: ^6.2.1
  intl: ^0.20.1
  # Utils
  uuid: ^4.5.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
